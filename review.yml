reviews:
  - date: '2026-06-03'
    rating: 3
    summary: >-
      EPFL has a real, publicly documented API surface that is stronger than
      most universities: the Actu news API and Memento events API both ship
      live interactive docs and default-unauthenticated REST endpoints, and
      Infoscience runs DSpace 7 with a working public REST API plus OAI-PMH.
      There is no single unified developer portal or formal plans/rate-limit
      documentation, and some services (e.g. go.epfl.ch) are gated to the EPFL
      community. All endpoints below were probed live on 2026-06-03; nothing
      was fabricated.
    endpoints:
      - url: https://actu.epfl.ch/api-docs/
        status: 200
        note: Actu News API interactive documentation, live.
      - url: https://actu.epfl.ch/api/v1/
        status: 200
        note: Actu News API base URL, responds.
      - url: https://memento.epfl.ch/api/docs/
        status: 200
        note: Memento Events API interactive documentation, live.
      - url: https://memento.epfl.ch/api/v1/
        status: 200
        note: Memento Events API base URL, responds.
      - url: https://infoscience.epfl.ch/server/api
